#####################################################################
# 	Fan Control
#####################################################################


[fan_generic nevermore]
pin: PE6
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5


[temperature_fan electronics]
pin: PC14
#tachometer_pin: VF5
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.1
sensor_type: temperature_host
control: pid
min_temp: 30
max_temp: 65
#max_delta: 5.0
pid_kp: 1.0
pid_ki: 0.5
pid_kd: 2.0
min_speed: 0.1
max_speed: 0.8
target_temp: 47


