#####################################################################
# 	Fan Control
#####################################################################


[fan_generic nevermore]
pin: PE6
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5


[temperature_fan electronics]
pin: PC14
#tachometer_pin: VF5
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.1
